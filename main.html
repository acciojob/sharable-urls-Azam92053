<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sharable URLs</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
    </style>
</head>
<body>

   
    <h3 id="url">https://localhost:8080/</h3>
    
    <form id="urlForm">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required><br><br>
        
        <label for="year">Graduation Year:</label>
        <input type="number" id="year" name="year" required><br><br>
        
        <button type="submit" id="button">Submit</button>
    </form>
    

    <script>
        document.getElementById("urlForm").addEventListener("submit", function(event) {
            event.preventDefault(); // Prevent the form from submitting

            // Get the values from the input fields
            const name = document.getElementById("name").value;
            const year = document.getElementById("year").value;

            // Construct the query string
            let queryString = "";
            if (name) {
                queryString += `name=${encodeURIComponent(name)}`;
            }
            if (year) {
                queryString += (queryString ? "&" : "") + `year=${encodeURIComponent(year)}`;
            }

            // Update the h3 element with the new URL
            const baseUrl = "https://localhost:8080/";
            document.getElementById("url").innerText = baseUrl + "?" + queryString;
        });
    </script>

</body>
</html>
